<html>
<head>
<title>Easy Banana Bread</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Recipe",
  "name": "Easy Banana Bread",
  "description": "Moist and delicious banana bread that's simple to make.",
  "prepTime": "PT10M",
  "cookTime": "PT1H",
  "totalTime": "PT1H10M",
  "recipeYield": "1 loaf",
  "recipeIngredient": [
    "3 ripe bananas",
    "1/3 cup melted butter",
    "3/4 cup sugar",
    "1 egg",
    "1 tsp vanilla extract",
    "1 tsp baking soda",
    "Pinch of salt",
    "1 1/2 cups all-purpose flour"
  ],
  "recipeInstructions": [
    {
      "@type": "HowToSection",
      "name": "Prepare the Batter",
      "itemListElement": [
        {
          "@type": "HowToStep",
          "text": "Preheat oven to 350°F. Mash the bananas in a mixing bowl."
        },
        {
          "@type": "HowToStep",
          "text": "Stir in melted butter, sugar, egg, and vanilla."
        },
        {
          "@type": "HowToStep",
          "text": "Mix in baking soda, salt, and flour until just combined."
        }
      ]
    },
    {
      "@type": "HowToSection",
      "name": "Bake",
      "itemListElement": [
        {
          "@type": "HowToStep",
          "text": "Pour batter into a greased 4x8 inch loaf pan."
        },
        {
          "@type": "HowToStep",
          "text": "Bake for 60 minutes or until a toothpick inserted in the center comes out clean."
        }
      ]
    }
  ]
}
</script>
</head>
<body><h1>Easy Banana Bread</h1></body>
</html>
