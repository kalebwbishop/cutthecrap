<html>
<head>
<title>Simple Tomato Soup</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Recipe",
  "name": "Simple Tomato Soup",
  "recipeIngredient": [
    "1 can (28 oz) crushed tomatoes",
    "1 cup vegetable broth",
    "1/2 cup heavy cream",
    "2 cloves garlic, minced",
    "Salt and pepper to taste"
  ],
  "recipeInstructions": "1. Sauté garlic in olive oil until fragrant. 2. Add crushed tomatoes and broth, simmer for 20 minutes. 3. Blend until smooth. 4. Stir in heavy cream and season with salt and pepper."
}
</script>
</head>
<body><h1>Simple Tomato Soup</h1></body>
</html>
