services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cutthecrap_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${ACR_REGISTRY:-}cutthecrap-backend:${IMAGE_TAG:-latest}
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:postgres@db:5432/cutthecrap_dev
      CORS_ORIGIN: http://localhost
      FRONTEND_URL: http://localhost
      WORKOS_REDIRECT_URI: http://localhost/api/v1/auth/callback
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${ACR_REGISTRY:-}cutthecrap-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_BASE: ""
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/assets/privacy-policy.html:/usr/share/nginx/html/privacy-policy.html:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
