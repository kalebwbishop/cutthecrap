# Proxy-Nginx Server Blocks for Cut The Crap
#
# Add these server blocks to the shared proxy-nginx configuration.
# All three environments share the same wildcard TLS cert (*.deploy-box.com).
#
# Backend aliases on proxy-net:
#   main → ctc-backend / ctc-frontend
#   dev  → ctc-dev-backend / ctc-dev-frontend
#   test → ctc-test-backend / ctc-test-frontend

# ── Production (main) ──────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name cutthecrap.deploy-box.com;

    ssl_certificate     /etc/nginx/certs/cutthecrap/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/cutthecrap/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /privacy-policy {
        alias /usr/share/nginx/html/cutthecrap/privacy-policy.html;
        default_type text/html;
    }

    location /api {
        proxy_pass http://ctc-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://ctc-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

